name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write       # tags + GitHub Releases
  pull-requests: write  # Version Packages PR
  id-token: write       # OIDC for npm + mcp-publisher

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          createGithubReleases: true
        env:
          # Fine-grained PAT (Contents + Pull requests RW) so pushes to
          # `changeset-release/main` trigger downstream `pull_request`
          # workflows. The default GITHUB_TOKEN is suppressed by GitHub
          # to prevent recursion, which leaves required status checks
          # stuck "Expected — Waiting for status to be reported" on the
          # Version Packages PR.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Install mcp-publisher
        if: steps.changesets.outputs.published == 'true'
        shell: bash
        run: |
          set -euo pipefail
          MCP_PUBLISHER_VERSION="1.7.6"
          ASSET="mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz"
          curl -fSL -o "$ASSET" "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/${ASSET}"
          curl -fSL -o checksums.txt "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/registry_${MCP_PUBLISHER_VERSION}_checksums.txt"
          if ! grep -q "  ${ASSET}$" checksums.txt; then
            echo "::error::Checksum entry for ${ASSET} not found in checksums.txt"
            exit 1
          fi
          grep "  ${ASSET}$" checksums.txt | sha256sum -c -
          tar xzf "$ASSET" mcp-publisher
          rm "$ASSET" checksums.txt

      - name: Authenticate to MCP Registry
        if: steps.changesets.outputs.published == 'true'
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        if: steps.changesets.outputs.published == 'true'
        run: ./mcp-publisher publish
